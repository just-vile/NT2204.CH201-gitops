apiVersion: v1
kind: Service
metadata:
  name: {{ include "saga-service.fullname" . }}
  labels: {{- include "saga-service.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - name: {{ .Values.service.portName }}
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.portName }}
      protocol: TCP
      appProtocol: http
  selector: {{- include "saga-service.selectorLabels" . | nindent 4 }}
