{{- if .Values.networkPolicy.enabled -}}
# Per-service NetworkPolicy.  Allows ingress from istio-system (sidecar / gateway)
# and same-namespace pods only.  Egress is unrestricted at this layer (DNS +
# data-plane traffic is gated by the namespace-scope NetworkPolicies in
# environments/<env>/networkpolicies/).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "saga-service.fullname" . }}
  labels: {{- include "saga-service.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels: {{- include "saga-service.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: istio-system
        - namespaceSelector:
            matchLabels:
              name: {{ .Release.Namespace }}
      ports:
        - protocol: TCP
          port: {{ .Values.containerPort }}
{{- end -}}
