# Reconciles platform/secrets/* — the sealed-secrets controller install.
#
# Wave -18: lands after namespaces (-20), before any data-plane operator
# (-17) — service-credential SealedSecrets in environments/local/secrets/
# rely on this controller existing first.
#
# automated.selfHeal is intentionally false: the sealed-secrets controller
# is the only resource here and a self-heal during a CRD-bearing chart
# upgrade will thrash. Phase 3 flips it back on.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: platform-secrets
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-18"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/just-vile/NT2204.CH201-gitops.git
    targetRevision: main
    path: platform/secrets
    directory:
      recurse: false
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: false
      selfHeal: false
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
