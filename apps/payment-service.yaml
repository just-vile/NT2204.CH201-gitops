apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: payment-service
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/REPLACE_ME_OWNER/saga-gitops.git
    targetRevision: main
    path: charts/saga-service
    helm:
      releaseName: payment-service
      valueFiles:
        - ../../environments/local/values-payment-service.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: saga
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
