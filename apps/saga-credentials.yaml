# Reconciles environments/local/secrets/*.sealedsecret.yaml
#
# Sync wave -10: lands AFTER the sealed-secrets controller (-18) so the
# CRD + decrypter are ready, and BEFORE every resource that references the
# resulting Secrets — Postgres `Cluster` CR (-2), `RabbitmqCluster` CR (-2),
# kube-prometheus-stack Grafana (-1), and the saga services (0).
#
# directory.include is intentionally specific: it only matches files
# ending in `.sealedsecret.yaml`. The committed `.example` placeholders
# end in `.yaml.example` and are ignored. README.md in the same folder is
# also ignored.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: saga-credentials
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/just-vile/NT2204.CH201-gitops.git
    targetRevision: main
    path: environments/local/secrets
    directory:
      recurse: false
      include: '*.sealedsecret.yaml'
  destination:
    server: https://kubernetes.default.svc
    namespace: saga
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
