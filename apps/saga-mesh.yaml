# Reconciles the saga-namespace mesh policy + L3/L4 NetworkPolicies + Ingress:
#   - environments/local/istio/        (Gateway, VirtualService, DestinationRules,
#                                       PeerAuthentication, AuthorizationPolicy)
#   - environments/local/networkpolicies/ (default-deny, allow-dns, allow-mesh,
#                                          allow-cnpg-apiserver)
#   - environments/local/ingress/      (rabbitmq-ui and other dev-only Ingresses)
#
# Sync wave 5: lands AFTER the saga services (wave 0).  Default-deny applied
# before any service exists would be safe but pointless; applying after means
# the services come up healthy, then the policy is tightened around them.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: saga-mesh
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "5"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: GitHub - just-vile/NT2204.CH201-gitops
    targetRevision: main
    path: environments/local
    directory:
      recurse: true
      include: '{istio/*.yaml,networkpolicies/*.yaml,ingress/*.yaml}'
  destination:
    server: https://kubernetes.default.svc
    namespace: saga
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
