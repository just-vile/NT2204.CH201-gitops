# Jaeger all-in-one (dev) — plain Deployment + Services.
#
# Replaces the Jaeger Operator pattern. The operator chart depends on
# cert-manager (admission webhook certs), which we don't want to install
# on the kind cluster. For a grad-project dev environment a single
# all-in-one pod with in-memory storage is sufficient: OTel Collector
# pushes OTLP traces in, the UI is reached by port-forward (same pattern
# as RabbitMQ / ArgoCD).
#
# Service names are kept identical to the operator-managed ones so nothing
# else in this repo has to change:
#   * jaeger-collector.jaeger.svc:4317 — referenced by
#     platform/observability/otel-collector.yaml (otlp/jaeger exporter)
#   * jaeger-query.jaeger.svc:16686    — referenced by
#     platform/observability/kube-prometheus-stack.yaml (Grafana datasource)
#     and used for `kubectl port-forward`.
#
# Production overlay (Phase 3): swap this for a Helm-rendered Jaeger with
# Elasticsearch/Cassandra storage, replicas, and an Istio Gateway route.
#
# Wave -2: after the OTel Collector chart's CRDs land at -1 (no operator
# dependency anymore, but kept at -2 so it comes up before saga apps at 0).
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jaeger
  namespace: jaeger
  labels:
    app.kubernetes.io/name: jaeger
    app.kubernetes.io/component: all-in-one
    app.kubernetes.io/part-of: saga-observability
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: jaeger
  template:
    metadata:
      labels:
        app.kubernetes.io/name: jaeger
        app.kubernetes.io/component: all-in-one
        app.kubernetes.io/part-of: saga-observability
    spec:
      containers:
        - name: jaeger
          image: jaegertracing/all-in-one:1.62.0
          imagePullPolicy: IfNotPresent
          env:
            - name: COLLECTOR_OTLP_ENABLED
              value: "true"
            - name: SPAN_STORAGE_TYPE
              value: memory
            - name: MEMORY_MAX_TRACES
              value: "50000"
            - name: QUERY_BASE_PATH
              value: /
          ports:
            - name: otlp-grpc
              containerPort: 4317
              protocol: TCP
            - name: otlp-http
              containerPort: 4318
              protocol: TCP
            - name: ui
              containerPort: 16686
              protocol: TCP
            - name: jaeger-thrift
              containerPort: 14268
              protocol: TCP
            - name: collector-grpc
              containerPort: 14250
              protocol: TCP
            - name: admin
              containerPort: 14269
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /
              port: admin
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: admin
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
---
# OTLP-in Service. Name MUST stay `jaeger-collector` so
# otel-collector.yaml's exporter target keeps resolving:
#   otlp/jaeger.endpoint = jaeger-collector.jaeger.svc.cluster.local:4317
apiVersion: v1
kind: Service
metadata:
  name: jaeger-collector
  namespace: jaeger
  labels:
    app.kubernetes.io/name: jaeger
    app.kubernetes.io/component: collector
    app.kubernetes.io/part-of: saga-observability
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: jaeger
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: otlp-grpc
      protocol: TCP
    - name: otlp-http
      port: 4318
      targetPort: otlp-http
      protocol: TCP
    - name: jaeger-thrift
      port: 14268
      targetPort: jaeger-thrift
      protocol: TCP
    - name: collector-grpc
      port: 14250
      targetPort: collector-grpc
      protocol: TCP
---
# Jaeger UI Service. Access pattern (matches RabbitMQ / ArgoCD UIs):
#   kubectl -n jaeger port-forward svc/jaeger-query 16686:16686
#   open http://localhost:16686
# Grafana points at jaeger-query.jaeger.svc.cluster.local:16686 in-cluster.
apiVersion: v1
kind: Service
metadata:
  name: jaeger-query
  namespace: jaeger
  labels:
    app.kubernetes.io/name: jaeger
    app.kubernetes.io/component: query
    app.kubernetes.io/part-of: saga-observability
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: jaeger
  ports:
    - name: ui
      port: 16686
      targetPort: ui
      protocol: TCP
    - name: admin
      port: 14269
      targetPort: admin
      protocol: TCP
 
 