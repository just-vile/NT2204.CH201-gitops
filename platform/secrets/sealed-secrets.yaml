# Sealed-Secrets controller.
#
# The controller decrypts SealedSecret CRs (committed to git, encrypted with
# the cluster's public key) into native k8s Secret resources in the target
# namespace.  We commit only `.example` placeholders to git; real
# SealedSecrets are sealed locally with `kubeseal` and committed under
# `environments/local/secrets/*.sealedsecret.yaml`.  See
# platform/secrets/README.md for the kubeseal workflow.
#
# Sync wave -18: after namespaces (-20), before any data-plane operator
# (-17) so the operators' SealedSecret-backed Secrets resolve in time.
#
# selfHeal: false on first sync — controller upgrades that change the CRD
# schema can briefly fail reconcile; automatic retries are fine, but a
# self-heal that races CRD/CR ordering will thrash. Re-enable in Phase 3.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sealed-secrets
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-18"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://bitnami.github.io/sealed-secrets
    chart: sealed-secrets
    targetRevision: 2.16.1
    helm:
      releaseName: sealed-secrets
      values: |
        fullnameOverride: sealed-secrets-controller
        # The controller's public-key fetch endpoint is namespaced; setting
        # this to the install ns makes `kubeseal --controller-namespace
        # sealed-secrets` work without extra args.
        namespace: sealed-secrets
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 256Mi
        metrics:
          serviceMonitor:
            enabled: false   # enabled in Phase 2 once kube-prom-stack lands
  destination:
    server: https://kubernetes.default.svc
    namespace: sealed-secrets
  syncPolicy:
    automated:
      prune: false
      selfHeal: false
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
