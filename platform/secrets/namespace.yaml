# # sealed-secrets controller namespace.
# # Wave -20 so it lands before the controller itself (-18). The controller is
# # the only thing that ever runs here; SealedSecret CRs targeting other
# # namespaces are decrypted by the controller and the resulting Secret is
# # created in the target ns.
# apiVersion: v1
# kind: Namespace
# metadata:
#   name: sealed-secrets
#   labels:
#     name: sealed-secrets
#     pod-security.kubernetes.io/enforce: baseline
#   annotations:
#     argocd.argoproj.io/sync-wave: "-20"
