# Operator namespaces for the data-plane. The `saga` namespace itself is
# already declared by platform/istio/namespace.yaml at wave -20; we do NOT
# re-declare it here to avoid SSA field-ownership churn. The operators run
# in their own namespaces; the CRs (postgres-cluster, rabbitmq-cluster) live
# in `saga` and emit Services there for the apps to consume.
---
apiVersion: v1
kind: Namespace
metadata:
  name: cnpg-system
  labels:
    name: cnpg-system
    pod-security.kubernetes.io/enforce: baseline
  annotations:
    argocd.argoproj.io/sync-wave: "-20"
---
apiVersion: v1
kind: Namespace
metadata:
  name: rabbitmq-system
  labels:
    name: rabbitmq-system
    pod-security.kubernetes.io/enforce: baseline
  annotations:
    argocd.argoproj.io/sync-wave: "-20"
