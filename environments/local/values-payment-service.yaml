# PaymentService — saga-service chart override.
#
# image.tag is bumped on every push-to-main by app/.github/workflows/bump-gitops.yml.

replicaCount: 0
image:
  repository: ghcr.io/just-vile/saga-payment-service
  tag: sha-2ab5107c391daa90334d1e179ccea52b88fdbc11
  pullPolicy: IfNotPresent
nameOverride: payment-service
fullnameOverride: payment-service
# Plain env-vars (non-sensitive). Sensitive values via envFromSecrets below.
env:
  ASPNETCORE_ENVIRONMENT: Development
  ASPNETCORE_URLS: http://0.0.0.0:8080
  RabbitMq__Host: rabbitmq.saga.svc.cluster.local
  RabbitMq__VirtualHost: "/"
  OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector.saga.svc.cluster.local:4317
  OTEL_EXPORTER_OTLP_PROTOCOL: grpc
# Phase 2: sensitive credentials from sealed Secrets in `saga` ns.
envFromSecrets:
  - name: RabbitMq__Username
    secretName: rabbitmq-creds
    key: RabbitMq__Username
  - name: RabbitMq__Password
    secretName: rabbitmq-creds
    key: RabbitMq__Password
  - name: ConnectionStrings__Postgres
    secretName: postgres-app-creds
    key: ConnectionStrings__Postgres__payment
