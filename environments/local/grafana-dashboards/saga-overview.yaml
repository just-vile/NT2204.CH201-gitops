# Saga overview Grafana dashboard.
#
# Verbatim copy of app/build/observability/grafana/provisioning/dashboards/saga-overview.json,
# wrapped in a ConfigMap with the `grafana_dashboard: "1"` label so the
# kube-prometheus-stack Grafana sidecar (label-based discovery, all
# namespaces) auto-imports it.
#
# Annotation `grafana_folder: Saga` puts the dashboard under a "Saga" folder
# in the Grafana UI; remove it to land at root.
#
# To regenerate after editing the source JSON in the app/ repo:
#   1. Copy the JSON contents into the data block below (preserve indent).
#   2. Bump the `dashboard.version` field inside the JSON so Grafana
#      reloads it.
apiVersion: v1
kind: ConfigMap
metadata:
  name: saga-overview-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
    app.kubernetes.io/part-of: saga
  annotations:
    grafana_folder: Saga
data:
  saga-overview.json: |
    {
      "title": "Saga Overview",
      "uid": "saga-overview",
      "tags": ["saga", "choreography"],
      "schemaVersion": 39,
      "version": 1,
      "refresh": "10s",
      "time": { "from": "now-15m", "to": "now" },
      "timezone": "browser",
      "editable": true,
      "graphTooltip": 1,
      "templating": {
        "list": [
          {
            "name": "DS_PROMETHEUS",
            "label": "Datasource",
            "type": "datasource",
            "query": "prometheus",
            "current": { "text": "Prometheus", "value": "Prometheus" },
            "hide": 0
          }
        ]
      },
      "annotations": { "list": [] },
      "panels": [
        {
          "type": "timeseries",
          "title": "Request rate per service (req/s)",
          "id": 1,
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "fieldConfig": {
            "defaults": { "unit": "reqps" },
            "overrides": []
          },
          "options": {
            "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["mean", "lastNotNull"] }
          },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
              "expr": "sum by (job) (rate(http_server_request_duration_seconds_count[1m]))",
              "legendFormat": "{{job}}"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "Error rate per service (5xx ratio)",
          "id": 2,
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "fieldConfig": {
            "defaults": { "unit": "percentunit", "min": 0, "max": 1 },
            "overrides": []
          },
          "options": {
            "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["mean", "max"] }
          },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
              "expr": "sum by (job) (rate(http_server_request_duration_seconds_count{http_response_status_code=~\"5..\"}[1m])) / sum by (job) (rate(http_server_request_duration_seconds_count[1m]))",
              "legendFormat": "{{job}}"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "HTTP latency p50 / p95 / p99 per service",
          "id": 3,
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "gridPos": { "h": 9, "w": 24, "x": 0, "y": 8 },
          "fieldConfig": {
            "defaults": { "unit": "s" },
            "overrides": []
          },
          "options": {
            "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["mean", "max"] }
          },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
              "expr": "histogram_quantile(0.50, sum by (le, job) (rate(http_server_request_duration_seconds_bucket[5m])))",
              "legendFormat": "{{job}} p50"
            },
            {
              "refId": "B",
              "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
              "expr": "histogram_quantile(0.95, sum by (le, job) (rate(http_server_request_duration_seconds_bucket[5m])))",
              "legendFormat": "{{job}} p95"
            },
            {
              "refId": "C",
              "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
              "expr": "histogram_quantile(0.99, sum by (le, job) (rate(http_server_request_duration_seconds_bucket[5m])))",
              "legendFormat": "{{job}} p99"
            }
          ]
        },
        {
          "type": "timeseries",
          "title": "Saga forward vs compensation events (msg/s)",
          "id": 4,
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "gridPos": { "h": 9, "w": 18, "x": 0, "y": 17 },
          "fieldConfig": {
            "defaults": { "unit": "cps", "custom": { "drawStyle": "bars", "stacking": { "mode": "normal" } } },
            "overrides": []
          },
          "options": {
            "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["mean", "sum"] }
          },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
              "expr": "sum by (messaging_destination_name) (rate(messaging_client_consumed_messages_total{messaging_destination_name=~\".*(Succeeded|Reserved|Dispatched|Completed)\"}[1m]))",
              "legendFormat": "forward / {{messaging_destination_name}}"
            },
            {
              "refId": "B",
              "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
              "expr": "sum by (messaging_destination_name) (rate(messaging_client_consumed_messages_total{messaging_destination_name=~\".*(Failed|Unavailable|Cancelled|Refunded|Released)\"}[1m]))",
              "legendFormat": "compensation / {{messaging_destination_name}}"
            }
          ]
        },
        {
          "type": "text",
          "title": "RabbitMQ queue depth (TODO)",
          "id": 5,
          "gridPos": { "h": 9, "w": 6, "x": 18, "y": 17 },
          "options": {
            "mode": "markdown",
            "content": "TODO: requires rabbitmq_exporter — add gitops side."
          }
        },
        {
          "type": "timeseries",
          "title": "Saga terminal outcomes (rate)",
          "id": 6,
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "gridPos": { "h": 9, "w": 18, "x": 0, "y": 26 },
          "fieldConfig": {
            "defaults": { "unit": "cps", "custom": { "drawStyle": "line", "stacking": { "mode": "none" } } },
            "overrides": []
          },
          "options": {
            "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["mean", "sum"] }
          },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
              "expr": "sum by (outcome) (rate(saga_terminal_total[5m]))",
              "legendFormat": "{{outcome}}"
            }
          ]
        },
        {
          "type": "stat",
          "title": "Compensation ratio",
          "id": 7,
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "gridPos": { "h": 9, "w": 6, "x": 18, "y": 26 },
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "min": 0,
              "max": 1,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 0.05 },
                  { "color": "red", "value": 0.2 }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "colorMode": "background",
            "graphMode": "area",
            "textMode": "auto"
          },
          "targets": [
            {
              "refId": "A",
              "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
              "expr": "sum(rate(saga_terminal_total{outcome=\"cancelled\"}[15m])) / sum(rate(saga_terminal_total[15m]))",
              "legendFormat": "cancelled / total"
            }
          ]
        }
      ]
    }
